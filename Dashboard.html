<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheets Data Fetching</title>
    <script>
        async function fetchData() {
            const apiKey = 'AIzaSyBFnsLkiRlzmqT92gaSthwz9rPdeNquvA0'; // Replace with your Google Sheets API key
            const spreadsheetId = '1r7CI_sQ2VvD9XHbkzVkq6jwlpj5TgeWLUrU2nzkrnOA'; // Replace with your Google Sheets ID
            const sheetName = 'CT'; // Replace with your sheet name
            const cellReference = 'A:H'; // Replace with your cell reference

            const url = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${sheetName}!${cellReference}?key=${apiKey}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.values) {
                    document.getElementById('output').innerText = data.values[0][0];
                } else {
                    document.getElementById('output').innerText = 'No data found';
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('output').innerText = 'Error fetching data';
            }
        }
    </script>
</head>
<body>
    <h1>Google Sheets Data Fetching</h1>
    <button onclick="fetchData()">Fetch Data</button>
    <p>Data from Google Sheet: <span id="output"></span></p>
</body>
</html>
