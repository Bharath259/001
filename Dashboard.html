<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheets Data Display</title>
    <script>
        // Replace with your Google Sheets ID and API key
        const SHEET_ID = '1r7CI_sQ2VvD9XHbkzVkq6jwlpj5TgeWLUrU2nzkrnOA'; 
        const API_KEY = 'AIzaSyBFnsLkiRlzmqT92gaSthwz9rPdeNquvA0'; 
        const RANGE = 'CT!A:E'; // Adjust the range as needed

        function fetchSheetData() {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}?key=${API_KEY}`;
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    const values = data.values;
                    const table = document.getElementById('sheet-data');
                    table.innerHTML = ''; // Clear existing table data

                    // Create table headers
                    const headerRow = document.createElement('tr');
                    values[0].forEach(header => {
                        const th = document.createElement('th');
                        th.textContent = header;
                        headerRow.appendChild(th);
                    });
                    table.appendChild(headerRow);

                    // Create table rows
                    for (let i = 1; i < values.length; i++) {
                        const row = document.createElement('tr');
                        values[i].forEach(cell => {
                            const td = document.createElement('td');
                            td.textContent = cell;
                            row.appendChild(td);
                        });
                        table.appendChild(row);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('sheet-data').textContent = 'Error loading data';
                });
        }

        // Fetch data initially and every 5 seconds
        window.onload = function() {
            fetchSheetData();
            setInterval(fetchSheetData, 5000);
        }
    </script>
</head>
<body>
    <div>
        <h1>Google Sheets Data:</h1>
        <table id="sheet-data">
            <!-- Data will be populated here -->
        </table>
        <p id="error-message" class="error-message"></p>
    </div>
</body>
</html>
