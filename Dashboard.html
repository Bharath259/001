<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheets Data Fetching</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid black;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
    </style>
    <script>
        // Automatically fetch data when the page loads
        window.onload = async function fetchData() {
            const apiKey = 'AIzaSyBFnsLkiRlzmqT92gaSthwz9rPdeNquvA0'; // Replace with your Google Sheets API key
            const spreadsheetId = '1r7CI_sQ2VvD9XHbkzVkq6jwlpj5TgeWLUrU2nzkrnOA'; // Replace with your Google Sheets ID
            const sheetName = 'CT'; // Replace with your sheet name
            const cellReference = 'A:H'; // Replace with your cell reference

            const url = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${sheetName}!${cellReference}?key=${apiKey}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.values) {
                    displayDataAsTable(data.values);
                } else {
                    document.getElementById('output').innerText = 'No data found';
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('output').innerText = 'Error fetching data';
            }
        }

        function displayDataAsTable(data) {
            const output = document.getElementById('output');
            output.innerHTML = ''; // Clear previous content

            // Create a table element
            const table = document.createElement('table');

            // Loop through the data and create table rows
            data.forEach((row, rowIndex) => {
                const tr = document.createElement('tr');

                row.forEach((cell) => {
                    const td = document.createElement('td');
                    td.textContent = cell;
                    tr.appendChild(td);
                });

                table.appendChild(tr);
            });

            // Append the table to the output div
            output.appendChild(table);
        }
    </script>
</head>
<body>
    <h1>Google Sheets Data Fetching</h1>
    <div id="output">Loading data...</div>
</body>
</html>
