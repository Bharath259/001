<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Include Chart.js from a CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h1>Expenses Dashboard</h1>
  
  <div class="dashboard-container">
    <!-- Totals by Category -->
    <div class="totals">
      <h2>Category Totals</h2>
      <ul>
        <li>NEEDS: <span id="needsTotal">$0.00</span></li>
        <li>WANTS: <span id="wantsTotal">$0.00</span></li>
        <li>REVENUE: <span id="revenueTotal">$0.00</span></li>
        <li>LIABILITIES: <span id="liabilitiesTotal">$0.00</span></li>
        <li>SAVINGS & INVESTMENTS: <span id="savingsTotal">$0.00</span></li>
      </ul>
    </div>
    
    <!-- Summary Section -->
    <div class="summary">
      <h2>Summary</h2>
      <p>Expenses: <span id="expensesTotal">$0.00</span></p>
      <p>Revenue: <span id="totalRevenue">$0.00</span></p>
      <p>Balance: <span id="balanceAmount">$0.00</span></p>
    </div>
    
    <!-- Charts Section -->
    <div class="charts">
      <h2>Charts</h2>
      <div class="chart-container">
        <canvas id="pieChart"></canvas>
      </div>
      <div class="chart-container">
        <canvas id="barChart"></canvas>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
