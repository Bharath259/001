<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Popup</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent background */
    }

    .popup-container {
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .popup-container h2 {
      margin-bottom: 20px;
      color: #333;
    }

    .password-inputs {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .password-digit {
      width: 30px;
      height: 30px;
      border: 1px solid #ccc;
      text-align: center;
      font-size: 16px;
      margin: 0 5px;
      border-radius: 4px;
      -webkit-text-security: disc; /* Chrome, Safari */
      text-security: disc; /* Firefox, Edge */
    }

    .error-message {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <h2>Enter Password</h2>
    <div class="password-inputs">
      <input type="text" class="password-digit" maxlength="1" inputmode="numeric">
      <input type="text" class="password-digit" maxlength="1" inputmode="numeric">
      <input type="text" class="password-digit" maxlength="1" inputmode="numeric">
      <input type="text" class="password-digit" maxlength="1" inputmode="numeric">
    </div>
    <p class="error-message"></p>
  </div>

  <script>
    const passwordDigits = document.querySelectorAll('.password-digit');
    const errorMessage = document.querySelector('.error-message');
    const correctPassword = "1234"; // Replace with your desired password
    const redirectUrl = "Form.html"; // Replace with your actual URL

    const validatePassword = () => {
      let enteredPassword = "";
      passwordDigits.forEach(digit => enteredPassword += digit.value);

      if (enteredPassword === correctPassword) {
        // Password is correct, redirect to the next page
        window.location.href = redirectUrl;
      } else {
        // Password is incorrect, display error message
        errorMessage.textContent = "Incorrect password. Please try again.";
        passwordDigits.forEach(digit => digit.classList.add('error'));

        // Clear error message and style after a few seconds
        setTimeout(() => {
          errorMessage.textContent = "";
          passwordDigits.forEach(digit => digit.classList.remove('error'));
        }, 2000);
      }
    };

    passwordDigits.forEach((digitInput, index) => {
      digitInput.addEventListener('input', () => {
        // Limit input to numbers
        digitInput.value = digitInput.value.replace(/\D/g, '');

        // Move focus to the next input on max character
        if (digitInput.value.length === 1 && index < passwordDigits.length - 1) {
          passwordDigits[index + 1].focus();
        }

        // Validate password when all digits are entered
        if (index === passwordDigits.length - 1 && digitInput.value.length === 1) {
          validatePassword();
        }
      });

      digitInput.addEventListener('keydown', (event) => {
        if (event.key === 'Backspace' && digitInput.value.length === 0 && index > 0) {
          passwordDigits[index - 1].focus();
          passwordDigits[index - 1].value = '';
        }
      });
    });
  </script>
</body>
</html>
