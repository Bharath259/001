<!DOCTYPE html>
<html>
<head>
<style> 

:root {
      --accent: #F18260;
      --purple: #252431;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #eee;
      color: var(--purple);
      padding: 10% 5%;
      font-family: system, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.4;
    }

    .form-container {
      position: relative;
      background: #fff;
      padding: 2rem;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: 350px;
      min-height: 300px;
      margin: 0 auto;
      box-shadow: 0 10px 50px 0 #ccc;
      margin-bottom: 2rem;
    }

    input, button {
      appearance: none;
      border: none;
      font-size: inherit;
      background: #eee;
      border-radius: 3px;
      padding: 1rem;
      width: 100%;
    }

    input {
      margin-bottom: 1rem;
    }

    input:focus {
      outline: 1px solid var(--accent);
    }

    button {
      color: #fff;
      cursor: pointer;
      background-color: var(--purple);
    }

    button:hover {
      background-color: var(--accent);
    }

    .is-hidden {
      display: none !important;
    }

    a {
      display: block;
      width: max-content;
      margin: 0 auto;
      color: var(--accent);
      text-decoration: none;
      margin-bottom: 0.5rem;
    }

    @keyframes rotate {
     100% { transform: rotate(360deg); }
    }

    @keyframes dash {
     0% { stroke-dasharray: 1,200; stroke-dashoffset: 0; }
     50% { stroke-dasharray: 89,200; stroke-dashoffset: -35; }
     100% { stroke-dasharray: 89,200; stroke-dashoffset: -124; }
    }

    .loading {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
    }

    .loading-spinner svg {
      position: relative;
      animation: rotate 2s linear infinite;
      height: 50px;
      width: 50px;
    }

    .loading-spinner circle {
      stroke: var(--accent);
      stroke-dasharray: 1,200;
      stroke-dashoffset: 0;
      stroke-linecap: round;
      animation: dash 1.5s ease-in-out infinite;
    }

	
/* Media query for devices with width less than 600px */
@media screen and (max-width: 600px) {
	input[type="text"], input[type="date"], select, input[type="number"], input[type="submit"] {
		width: 100%;
	}
}
</style>
</head>
<body>

<div>
	<h3>Test Expense Form</h3>
	<form id="myForm" onsubmit="handleFormSubmit(this)">
		<label for="hiring_date">Hiring Date</label>
			<input type="date" class="form-control" id="hiring_date" name="hiring_date">
			<br>
		<label for="department">Category</label>
		<select name="department" id="department">
			<option value="Food">Food</option>
			<option value="Bills">Bills</option>
			<option value="Transport">Transport</option>
			<option value="Personal">Personal</option>
			<option value="Shopping">Shopping</option>
		</select>
		<br>
		<label for="description">Description</label>
		<input type="text" class="form-control" id="description" name="description" placeholder="Describe the expense...">
		<br>
		<label for="note">Note</label>
		<input type="text" class="form-control" id="note" name="note" placeholder="Write your notes here...">
		<br>
		<label for="amount">Amount</label>
		<input type="=number" class="form-control" id="amount" name="amount" placeholder="Enter the amount" value="=">
		<br>
		<input type="submit" value="Submit">
	</form>
	<p id="output"></p>
</div>

<script>
function preventFormSubmit(){
	var forms = document.querySelectorAll('form');
	for (var i = 0; i < forms.length; i++){
		forms[i].addEventListener('submit', function(event){
			event.preventDefault();
		});
	}
}
window.addEventListener('load', preventFormSubmit);

function handleFormSubmit(formObject){
	google.script.run.processForm(formObject);
	document.getElementById("myForm").reset();
}
</script>

</body>
</html>
