<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Expenses Bar Graph</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.js"></script>
</head>
<body>

  <h2>Personal Expenses Bar Graph</h2>
  <canvas id="myChart" style="width: 100%; max-width: 700px;"></canvas>

  <!-- Chart.js script remains unchanged -->
  <script>
  fetch('https://docs.google.com/spreadsheets/d/1vaSaQd5wPhDfSk-YxBuhCJwjRwiMIWmsDznUvkwAaKE/edit#gid=0') // Replace with your actual web app URL
    .then(response => response.json())
    .then(data => {
      const xValues = ["Food", "Bills", "Housing", "Transport", "Shopping", "Personal"];
      const yValues = data[0]; // Assuming the data is in the first row
      new Chart("myChart", {
        type: "bar",
        data: {
          labels: xValues,
          datasets: [{
            backgroundColor: "rgba(75, 192, 192, 0.6)",
            data: yValues
          }]
        },
        options: {
          scales: {
            yAxes: [{
              ticks: {
                beginAtZero: true
              }
            }]
          },
          legend: { display: false }
        }
      });
    })
    .catch(error => console.error('Error:', error));
</script>

</body>
</html>
