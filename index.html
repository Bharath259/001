<!DOCTYPE html>
<html>
<head>
<style>
/* Base styles */
h1, p, div {
	text-align: center;
}

/* Styles for inputs and select elements */
input[type="text"], input[type="date"], select, input[type="number"] {
	width: 80%; /* Adjusted for better mobile responsiveness */
	padding: 12px 20px;
	margin: 8px 0;
	display: inline-block;
	border: 1px solid #ccc;
	border-radius: 4px;
	box-sizing: border-box;
}

/* Styles for submit button */
input[type="submit"] {
	width: 80%; /* Adjusted for better mobile responsiveness */
	background-color: #4CAF50;
	color: white;
	padding: 14px 20px;
	margin: 8px 0;
	border: none;
	border-radius: 4px;
	cursor: pointer;
}

input[type="submit"]:hover {
	background-color: #45a049;
}

/* Container div styles */
div {
	border-radius: 5px;
	background-color: #f2f2f2;
	padding: 20px;
}

/* Media query for devices with width less than 600px */
@media screen and (max-width: 600px) {
	input[type="text"], input[type="date"], select, input[type="number"], input[type="submit"] {
		width: 100%;
	}
}
</style>
</head>
<body>

<div>
	<h3>Test Expense Form</h3>
	<form id="myForm" onsubmit="handleFormSubmit(this)">
		<label for="hiring_date">Hiring Date</label>
			<input type="date" class="form-control" id="hiring_date" name="hiring_date">
			<br>
		<label for="department">Category</label>
		<select name="department" id="department">
			<option value="Food">Food</option>
			<option value="Bills">Bills</option>
			<option value="Transport">Transport</option>
			<option value="Personal">Personal</option>
			<option value="Shopping">Shopping</option>
		</select>
		<br>
		<label for="description">Description</label>
		<input type="text" class="form-control" id="description" name="description" placeholder="Describe the expense...">
		<br>
		<label for="note">Note</label>
		<input type="text" class="form-control" id="note" name="note" placeholder="Write your notes here...">
		<br>
		<label for="amount">Amount</label>
		<input type="=number" class="form-control" id="amount" name="amount" placeholder="Enter the amount" value="=">
		<br>
		<input type="submit" value="Submit">
	</form>
	<p id="output"></p>
</div>

<script>
function preventFormSubmit(){
	var forms = document.querySelectorAll('form');
	for (var i = 0; i < forms.length; i++){
		forms[i].addEventListener('submit', function(event){
			event.preventDefault();
		});
	}
}
window.addEventListener('load', preventFormSubmit);

function handleFormSubmit(formObject){
	google.script.run.processForm(formObject);
	document.getElementById("myForm").reset();
}
</script>

</body>
</html>
