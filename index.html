<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="password.css">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
    <title>Password Hide // Show</title>
</head>
<body>
    <div class="container">
        <form id="passwordForm">
            <div class="input-box">
                <input type="password" spellcheck="false" required>
                <label for="">Password</label>
                <i class="uil uil-eye-slash toggle"></i>
            </div>
        </form>
    </div>

    <script>
        const correctCode = "1234"; // Replace with your desired code

        const toggle = document.querySelector(".toggle");
        const input = document.querySelector("input");

        toggle.addEventListener("click", () => {
            if (input.type === "password") {
                input.type = "password";
                toggle.classList.replace("uil-eye-slash", "uil-eye");
            } else {
                input.type = "password";
            }
        });

        document.getElementById("passwordForm").addEventListener("submit", function (event) {
            event.preventDefault();
            const enteredCode = input.value;
            if (enteredCode === correctCode) {
                // Redirect to the next page (replace with your actual URL)
                window.location.href = "Form.html";
            } else {
                alert("Incorrect code. Please try again.");
            }
        });
    </script>
</body>
</html>
