<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Form Example</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Daily Expenses</h1>
<div class="form-container">

  <form id="myForm" action="https://script.google.com/macros/s/AKfycbwQqNCabg4ZQaXAq_mXUq2MFohiMBBbXJVxYsaIMH2ZiYl8urz40KxDq4B4lyUWBIhEaA/exec" method="post">
       <div class="date-picker">
            <label for="SelectedDate">Select Date:</label>
            <input type="date" id="selectedDate" value="">
      </div>
      <label for="Categories">Select Categories:</label>
      <select id="Categories" name="Categories">
        <option value="Food">Food</option>
        <option value="Bills">Bills</option>
        <option value="Housing">Housing</option>
        <option value="Transports">Transports</option>
        <option value="Shopping">Shopping</option>
        <option value="Personal Discretionary">Personal Discretionary</option>
        <option value="Income">Income</option>
        <option value="Credit_Card">Credit_Card</option>
        <option value="Cashback">Cashback</option>
        <!-- Add more options here -->
      </select>

        <label for="Description">Description:</label>
      <textarea autocapitalize="word" type="text" id="Description" name="Description" required></textarea><br>
      
      <label for="Note">Note:</label>
      <textarea autocapitalize="word" type="text" id="Note" name="Note" required></textarea><br>
      <label for="Amount">Amount:</label>
      <input type="number" id="Amount" name="Amount">
      
    <input class="submitButton" type="submit" value="submit" />
  </form>
</div>
<!-- Modal HTML -->
<div id="myModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <p id="modalNote"></p>
  </div>
</div>
